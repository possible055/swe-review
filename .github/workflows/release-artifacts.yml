name: Release artifacts

on:
  workflow_dispatch:
    inputs:
      versions:
        description: "Release tag names, separated by spaces, commas, or new lines. Leave empty to use the selected tag."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  BINARY_NAME: swe-review
  PACKAGE_NAME: swe-review
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare versions
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.versions }}
    steps:
      - name: Resolve release versions
        id: versions
        shell: bash
        env:
          INPUT_VERSIONS: ${{ github.event.inputs.versions }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          raw="$INPUT_VERSIONS"
          if [[ -z "${raw//[[:space:],]/}" ]]; then
            raw="$REF_NAME"
          fi

          declare -a versions=()
          declare -A seen=()
          while IFS= read -r candidate; do
            version="${candidate#refs/tags/}"
            if [[ -z "$version" || -n "${seen[$version]:-}" ]]; then
              continue
            fi
            if [[ ! "$version" =~ ^v[0-9][0-9A-Za-z._+-]*$ ]]; then
              echo "Invalid release version: $version"
              echo "Use tag names such as v0.1.0."
              exit 1
            fi
            seen["$version"]=1
            versions+=("$version")
          done < <(printf '%s\n' "$raw" | tr ',[:space:]' '\n' | sed '/^$/d')

          if [[ "${#versions[@]}" -eq 0 ]]; then
            echo "No release versions were provided."
            exit 1
          fi

          json="$(printf '%s\n' "${versions[@]}" | jq -R . | jq -s -c .)"
          echo "versions=$json" >> "$GITHUB_OUTPUT"
          echo "Release versions: $json"

  check:
    name: Check ${{ matrix.version }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.prepare.outputs.versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.version }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked

  package:
    name: Package ${{ matrix.version }} ${{ matrix.build.platform }}
    runs-on: ${{ matrix.build.os }}
    needs:
      - prepare
      - check
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.prepare.outputs.versions) }}
        build:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            platform: linux-x86_64-musl
            archive_ext: tar.gz
            cc_env: CC_x86_64_unknown_linux_musl
            linker_env: CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64-gnu
            archive_ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos-x86_64
            archive_ext: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            platform: macos-aarch64
            archive_ext: tar.gz
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            archive_ext: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: windows-aarch64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.version }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.build.target }}

      - name: Install musl toolchain
        if: contains(matrix.build.target, 'musl')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools
          echo "${{ matrix.build.cc_env }}=musl-gcc" >> "$GITHUB_ENV"
          echo "${{ matrix.build.linker_env }}=musl-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.build.target }}

      - name: Smoke test
        if: runner.os != 'Windows'
        run: ./target/${{ matrix.build.target }}/release/${{ env.BINARY_NAME }} --help

      - name: Check Linux binary compatibility
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          binary="./target/${{ matrix.build.target }}/release/${BINARY_NAME}"

          if [[ "${{ matrix.build.target }}" == *-musl ]]; then
            if readelf --version-info "$binary" 2>/dev/null | grep -q 'GLIBC_'; then
              echo "musl artifact unexpectedly references glibc symbols"
              readelf --version-info "$binary"
              exit 1
            fi

            if ldd "$binary" 2>&1 | grep -q 'libc\.so\.6'; then
              echo "musl artifact unexpectedly links to glibc"
              ldd "$binary"
              exit 1
            fi
          fi

      - name: Smoke test
        if: runner.os == 'Windows'
        run: .\target\${{ matrix.build.target }}\release\${{ env.BINARY_NAME }}.exe --help

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_VERSION: ${{ matrix.version }}
          RELEASE_PLATFORM: ${{ matrix.build.platform }}
        run: |
          set -euo pipefail
          rm -rf dist
          staging="dist/package/${PACKAGE_NAME}"
          archive="${PACKAGE_NAME}-${RELEASE_VERSION}-${RELEASE_PLATFORM}.tar.gz"
          mkdir -p "$staging/bin"
          cp "target/${{ matrix.build.target }}/release/${BINARY_NAME}" "$staging/bin/"
          cp SKILL.md README.md LICENSE .env.example "$staging/"
          chmod 755 "$staging" "$staging/bin"
          chmod 644 "$staging/SKILL.md" "$staging/README.md" "$staging/LICENSE" "$staging/.env.example"
          chmod 755 "$staging/bin/${BINARY_NAME}"
          test -x "$staging/bin/${BINARY_NAME}"
          "$staging/bin/${BINARY_NAME}" --help
          "$staging/bin/${BINARY_NAME}" --path "$staging/missing-project" 2> "$staging/smoke.stderr" && exit 1
          grep -q "Project path does not exist" "$staging/smoke.stderr"
          rm "$staging/smoke.stderr"
          tar -czf "dist/${archive}" -C dist/package "$PACKAGE_NAME"
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "$archive.sha256"
          else
            shasum -a 256 "$archive" > "$archive.sha256"
          fi

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ matrix.version }}
          RELEASE_PLATFORM: ${{ matrix.build.platform }}
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          $staging = "dist\package\$env:PACKAGE_NAME"
          $archive = "$($env:PACKAGE_NAME)-$($env:RELEASE_VERSION)-$($env:RELEASE_PLATFORM).zip"
          New-Item -ItemType Directory -Force "$staging\bin" | Out-Null
          Copy-Item "target\${{ matrix.build.target }}\release\$($env:BINARY_NAME).exe" "$staging\bin"
          Copy-Item SKILL.md, README.md, LICENSE, .env.example $staging
          & "$staging\bin\$($env:BINARY_NAME).exe" --help
          if ($LASTEXITCODE -ne 0) {
            throw "Bundled $($env:BINARY_NAME) --help failed with exit code $LASTEXITCODE"
          }
          & "$staging\bin\$($env:BINARY_NAME).exe" --path "$staging\missing-project" 2> "$staging\smoke.stderr"
          $smokeExitCode = $LASTEXITCODE
          if ($smokeExitCode -eq 0) {
            throw "Expected smoke test to fail on missing project path"
          }
          $smokeStderr = Get-Content "$staging\smoke.stderr" -Raw
          if (-not $smokeStderr.Contains("Project path does not exist")) {
            throw "Smoke test did not reach project path validation"
          }
          $global:LASTEXITCODE = 0
          Remove-Item "$staging\smoke.stderr"
          Compress-Archive -Path $staging -DestinationPath "dist\$archive" -Force
          Push-Location dist
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -FilePath "$archive.sha256" -Encoding ascii
          Pop-Location

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.version }}-${{ matrix.build.platform }}
          path: |
            dist/${{ env.PACKAGE_NAME }}-${{ matrix.version }}-${{ matrix.build.platform }}.${{ matrix.build.archive_ext }}
            dist/${{ env.PACKAGE_NAME }}-${{ matrix.version }}-${{ matrix.build.platform }}.${{ matrix.build.archive_ext }}.sha256
          if-no-files-found: error
          retention-days: 30

  package-gnu:
    name: Package ${{ matrix.version }} linux-x86_64-gnu
    runs-on: ubuntu-24.04
    needs:
      - prepare
      - check
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.prepare.outputs.versions) }}
    env:
      GNU_TARGET: x86_64-unknown-linux-gnu
      GNU_ARTIFACT_PLATFORM: linux-x86_64-gnu
      GNU_TARGET_DIR: target/gnu
      MAX_GLIBC_VERSION: "2.24"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.version }}

      - name: Build release binary in old glibc container
        shell: bash
        run: |
          set -euo pipefail
          uid="$(id -u)"
          gid="$(id -g)"
          docker run --rm \
            --user "$uid:$gid" \
            -e HOME=/tmp/home \
            -e CARGO_TERM_COLOR=always \
            -e BINARY_NAME \
            -e GNU_TARGET \
            -e CARGO_TARGET_DIR="$GNU_TARGET_DIR" \
            -e MAX_GLIBC_VERSION \
            -v "$PWD:/work" \
            -w /work \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -lc '
              set -euo pipefail
              mkdir -p "$HOME"
              toolchain="$(sed -n "s/^channel = \"\(.*\)\"/\1/p" rust-toolchain.toml)"
              test -n "$toolchain"
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain "$toolchain"
              source "$HOME/.cargo/env"
              rustup target add "$GNU_TARGET"
              cargo build --release --locked --target "$GNU_TARGET"

              binary="$CARGO_TARGET_DIR/$GNU_TARGET/release/$BINARY_NAME"
              max_glibc="$(readelf --version-info "$binary" \
                | grep -oE "GLIBC_[0-9]+\.[0-9]+" \
                | sort -Vu \
                | tail -1 \
                | sed "s/GLIBC_//")"
              echo "Maximum required glibc: $max_glibc"
              if [[ "$(printf "%s\n%s\n" "$max_glibc" "$MAX_GLIBC_VERSION" | sort -V | tail -1)" != "$MAX_GLIBC_VERSION" ]]; then
                echo "GNU artifact requires glibc $max_glibc, expected <= $MAX_GLIBC_VERSION"
                exit 1
              fi

              "$binary" --help
            '

      - name: Smoke test on old Linux containers
        shell: bash
        run: |
          set -euo pipefail
          binary="${GNU_TARGET_DIR}/${GNU_TARGET}/release/${BINARY_NAME}"
          docker run --rm -v "$PWD:/work:ro" -w /work debian:9 "$binary" --help
          docker run --rm -v "$PWD:/work:ro" -w /work ubuntu:18.04 "$binary" --help

      - name: Package Linux artifact
        shell: bash
        env:
          RELEASE_VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          rm -rf dist
          staging="dist/package/${PACKAGE_NAME}"
          archive="${PACKAGE_NAME}-${RELEASE_VERSION}-${GNU_ARTIFACT_PLATFORM}.tar.gz"
          mkdir -p "$staging/bin"
          cp "${GNU_TARGET_DIR}/${GNU_TARGET}/release/${BINARY_NAME}" "$staging/bin/"
          cp SKILL.md README.md LICENSE .env.example "$staging/"
          chmod 755 "$staging" "$staging/bin"
          chmod 644 "$staging/SKILL.md" "$staging/README.md" "$staging/LICENSE" "$staging/.env.example"
          chmod 755 "$staging/bin/${BINARY_NAME}"
          test -x "$staging/bin/${BINARY_NAME}"
          "$staging/bin/${BINARY_NAME}" --help
          "$staging/bin/${BINARY_NAME}" --path "$staging/missing-project" 2> "$staging/smoke.stderr" && exit 1
          grep -q "Project path does not exist" "$staging/smoke.stderr"
          rm "$staging/smoke.stderr"
          tar -czf "dist/${archive}" -C dist/package "$PACKAGE_NAME"
          cd dist
          sha256sum "$archive" > "$archive.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.version }}-${{ env.GNU_ARTIFACT_PLATFORM }}
          path: |
            dist/${{ env.PACKAGE_NAME }}-${{ matrix.version }}-${{ env.GNU_ARTIFACT_PLATFORM }}.tar.gz
            dist/${{ env.PACKAGE_NAME }}-${{ matrix.version }}-${{ env.GNU_ARTIFACT_PLATFORM }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish ${{ matrix.version }}
    runs-on: ubuntu-latest
    needs:
      - prepare
      - package
      - package-gnu
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.prepare.outputs.versions) }}
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-${{ matrix.version }}-*
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" dist/* --clobber
          else
            gh release create "$RELEASE_VERSION" dist/* --generate-notes --verify-tag
          fi
